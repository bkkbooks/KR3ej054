front:
  text: 吳序夫天有非時之氣人即有非時之疾稟賦強厚者尚得以元氣勝之惟麻痘兩症盡人不免每多發於嬰兒則為寰區通病考先哲傳書詳於論痘而略於論麻蓋以麻出六腑與痘出五臟者不同治得其法可以片言居要後學不明此意輒謂治痘難治麻易淺試輕嘗多至草菅人命良可悲也壬子歲自春延及夏秋凡大村小落小兒枉折者不知凡幾雖曰氣數使然亦半由司命者未得其竅要也硯丞匯有麻疹備要皆採古人精言良法可與明理者證活幼之心源頃因家君代刻神灸經綸一書請付梓其後爰志數言於簡端時咸豐三年歲次癸丑仲夏月雙溪吳與九書於聊且粗略之居
