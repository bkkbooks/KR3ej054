body:
  text: 原始論疹之為病也本乎胎毒感時行沴戾之氣而發亦與痘同但痘出五臟屬陰陰主血故有形有漿其症有寒有熱有虛實疹出於六腑屬陽陽主氣故有形無漿其症多實有熱而無寒症既不同治法亦異世咸知痘疹所繫於人者甚重而不知疹之系人生死者為尤重蓋人當有生之初受天地之氣以成形干為天陽也故稱乎父坤為地陰也故稱乎母陰陽二氣交感而相火即寓乎其中所以陰中之火伏於人之身發而為痘陽中之火伏於人之身發而為疹當其未發無形可擬無跡可尋如石中之火必擊而後動及其動也因人之稟質為輕重輕者可不治而愈重者非善治不愈所謂先天而天不違者此也又必因天行之時氣為緩急緩者外邪之來不暴疾可輕散可清解隨表達而不遺重者外邪之氣多暴疾正氣先被其侵伐內毒蘊結而不出急當專力以治其標使蘊結者乘勢而外達所謂後天而奉天時者此也苟能悉先天之體明後天之用則周旋折旋無所往而不得其中矣疹脈凡候疹脈自初熱見形以及收沒但看右手一指脈洪大有力雖有雜症亦無大害蓋右手一指脈太陰肺脈也肺主皮毛脈氣通自能載毒外出是以無害若肺脈沉小無力大非所宜疹發於陽經脈反沉小是為陽症陰脈司命者於此處最要留心不得謂疹症無虛寒而固執清熱解毒以敗乃事也辨症症者證也證之於外以知其內凡病皆然不獨疹也疹出於脾肺二經初必因外感而發與傷風傷寒無異特其症咳嗽噴嚏面腫腮赤目胞浮腫眼淚汪汪鼻流清涕呵欠悶頓乍涼乍熱手足稍冷或中指獨冷睡時驚悸或噁心嘔噦或以手掐面目唇鼻是皆出疹之候又必發熱五六日而後見遍身紅點大者如蘇子次者如芥子小者如蠶子而成粒成片者是也麻則最細而碎如蚊跡模糊斑則無顆粒惟成片紅紫如雲如錦又有遍身但紅而絕無斑點者謂之火丹數種亦皆疹類大都正疹則熱至五六日而後出則成朵成粒非若斑疹之皮紅成片也且斑疹之出則不拘三日四日五日六日出而又沒沒而又出俗謂一日三出三日九出只要出透以遍身紅潤者為美最嫌黑陷及面目胸腹稠密纏鎖咽喉者為逆發不出而喘者即死如傷寒發斑不能透發者亦危金鑑謂麻為正疹亦胎元之毒故凡出疹必須識各經中現症如邪氣遏鬱於脾則泄瀉不止擾亂於心則煩熱不退而發驚熏灼於肺則嘔嗽出血移熱於肝則目多眵淚歸結於腎則牙齦爛而疳蝕五臟受病既深正氣日餒而不振若非及早圖之鮮有不敗者矣更有不治之症如黑黯焦枯一出即沒者氣血兩敗也鼻扇口張者脾肺氣將絕也鼻青糞黑者脾腎垂危也氣喘心前吸者心氣已殆也諺云走馬看麻痘極言其變遷甚速非比尋常內傷外感可緩治以圖功初熱天地六淫之氣感人多致發熱但手足稍微冷惡寒而無汗面色青慘不舒左頰有青紋者傷寒之熱也手足稍微冷發熱有汗面赤而光者傷風之熱也目胞腫右頰有筋發熱時頭額肚腹更甚或兼嘔吐腹疼者傷食之熱也面色青紅額正中有紋手掌心有汗時作驚惕手絡微動而發熱者驚熱也身熱而倍能食唇紅頰赤大小便秘脅下汗者火熱也面色紅黃發熱多汗腹痛吐瀉暑邪濕熱也凡此症各不同而熱則一麻疹之熱又何以別大法以面赤耳冷手中指獨冷目含淚鼻清涕咳嗽噴嚏為別耳且麻疹發熱見點近者五六日遠則七八朝甚者有十餘日不限定日數也初起一二日內不可即行汗解妄用寒涼若熱發微和發一日退一日可不必服藥如熱來連日不退嗽煩無汗宣毒發表湯主之或用升麻葛根湯發之疹治合時疹由胎毒亦必因時令之氣而發先宜表托使毒盡達於肌表若過用寒涼遏伏熱毒則必不能出透多致毒氣內攻喘悶而亡若已出透又當清利以解餘熱免致疹後變生諸症且疹屬陽熱重則陰分受傷血為所耗故沒後必須養血以保陰虧發燥勿執泥於清利也若病者血氣和平素無他疾雖感時氣而正能勝邪發熱必然和緩微微汗出神清氣爽二便調勻見點則透徹收沒亦不疾不徐此為輕而易治故萬氏家法戒用藥不可太早恐致耗散元氣反生害患必待見點方用徐徐升發然飲藥亦有次第凡一劑分作十餘次服以疹在皮膚之間若作一次服則藥性催之太速每致譫語煩躁是可為輕視妄藥之良箴也若素有風寒食滯表裡交雜一觸邪陽火旺之氣內外合發而正不能制邪必大熱無汗躁煩口渴神氣不清便閉尿澀見點不能透徹收散或太急速則為重而難治急宜臨機審察果犯何逆損其有餘扶其不足毋稍存遊移之見此又萬氏之法不可拘守也善治者機圓而法活用藥必合時宜如時值溫暖宜發之以辛涼用防風解毒湯時值暄熱宜治之以辛寒用黃連解毒湯若大寒之時宜以辛溫發之用桂枝解毒湯或麻黃湯當乍寒乍暖之際宜以辛平發之用升麻解毒湯或荊防敗毒散因時用藥毋伐天和又須看人之虛實如大便閉結躁煩熱重疹發不出屬實症者將酒蒸大黃微利之如大小便清利熱不重吐利不止屬虛症者可加人參白朮之類補托之毋實實毋虛虛貴得其平中病則止如用前藥發散一劑而疹仍不出再作一劑水煎溫服外擦以芫荽酒又以苧麻蘸酒戛之務使肌理疏通疹盡透發於表庶無腹脹喘閉之患若再不出則為不治之症矣然亦有不盡然者當人人束手之時細心詳察一初起發熱遍身自汗此毒從汗解麻疹易出若自汗過多又是火盛內迫致汗妄流恐有亡陽之變宜當歸六黃湯加浮麥止之一發熱鼻血亦毒從鼻衄解也不可妄治倘血出太多是火盛致血妄行以茅花湯主之一發熱嘔吐者是邪火內逼毒氣上行用竹茹石膏湯微吐者不必用此一初起自利甚者亦火邪內熾毒氣奔下大腸宜升麻澤瀉湯一初熱裡急後重毒甚而滯下也宜黃芩芍藥湯一初熱咳嗽氣急而出不快者宜麻黃湯春夏秋加石膏冬加桂枝或用羌活散或用消毒飲外以芫荽酒自頭至足遍擦之見形論治麻出有陰陽部位多寡之分自頭而背及四肢向外處為陽部宜多出起頂向內處為陰部宜稀少若見陽部稀疏而不起頂縱陰部多出起發是陰陽相反必有後患當預防之又云自耳後項上腰腿先見其頂尖而不長其形小而勻淨者吉也勿藥有喜大凡疹子只要出得盡則毒邪散正氣自得和平如拂拂發熱煩悶不安如蛇在灰如蚓在塵或嘔吐注瀉皆毒邪壅遏尚未盡出急用托裡散表之劑或用麻黃湯去杏仁加蟬蛻升麻外用胡荽酒之類一疹出色白由於脾胃氣餒血不充肌不可專主於清熱宜助益脾氣或養營湯或人參敗毒散主之一風寒外閉欲出不出熱重無汗內外有不可解之勢速用羌活內托散若見隱影紫色熱甚氣喘宜清熱黃芩湯一麻出紫黑晦暗不透宜黃連解毒湯若紫紅乾燥色晦是火毒熾盛宜滋陰涼血湯或大青湯或元參湯選用一麻出不透熱極目紅發痰作喘此毒未盡出氣因熱逼宜用柴連解毒湯一麻出熱不退渴不止遍身如錦紋者宜化斑湯毒甚煩躁不眠紫滯不紅活者宜疏風解毒飲夾痰煩渴者宜人參白虎湯一麻出夾斑無他雜症宜小柴胡湯若蘊毒發斑者宜黃芩橘皮湯疹出色黑熱毒亢極乃不治之症姑用加味化斑湯或涼血解毒湯一麻出紫赤內熱極也但得形色光潤顆粒尖聳者可治速宜清涼解毒佐以清痰定喘便得安痊若枯燥無起色者不治又有見暖則紅活不暖則枯燥是為風寒所折雖宜涼解不可太過如見疹色鮮紅光澤有豔頭粒離肉者輕頭頂平塌不起者重一麻出如雲一片紅腫又有細碎紅點見於紅腫大片之上此毒火熾盛宜清解分利一疹已透表而粒焦者無分紅淡皆屬熱重急當清解肺胃之熱分利小便如大便閉者佐以涼血潤下之品甚則投以承氣湯失治則變紫黑難以救療一暑月出疹發自陽明古人治暑以白虎湯主之蓋以暑必兼濕非用甘寒不足以徹其熱若疹毒內發暑濕外侵煩渴神不安者宜卻暑丹佐以化毒一咳嗽氣喘口乾心煩者乃毒在心肺發未盡也宜瀉白散一咽喉腫痛不能食者乃毒火抑鬱上熏宜甘桔湯加味或以千金散少許用竹管吹入喉中或玉鎖匙亦可一疹出即沒煩渴躁甚者宜白虎湯加桔梗連進二三服若疹出後熱不退連綿三四日不收者此毒火太甚外發未盡內有餘邪宜化斑湯或消毒飲加元參石膏桔梗倘遍身既出而猶煩熱頻作嘔吐此毒邪留於肺胃亦宜化斑湯如大便閉結者少加大黃微利之收沒論治麻疹收沒期以三日為常不疾不徐自無後患若未至三日而沒肌膚暖處絕無形影此為太速必因調攝不謹或為風寒所襲或為邪穢所觸以致毒反內攻急宜內服荊防解毒湯外用胡荽酒熏其衣被使疹透出方保無虞有至二三日疹雖沒而肌膚暖處還有形跡此毒尚未盡失治必致內攻仍當疏托佐以清涼若當散不散者內有虛熱留滯於肌表也切不可純用寒涼之劑以柴胡四物湯治之使血分和暢餘熱悉除疹即沒矣若麻點帶白色隱於肌表似沒而不沒者必因風寒外折而不能透發亦表虛故也宜溫散風寒使白變紅活免致生變古云白疹溫而自消是也有延至五六日不沒者此內熱未除以致不能盡沒宜清涼佐以利水若加煩躁右關脈洪數有力此胃中伏有濕熱宜化斑湯若疹已沒而身猶熱晝夜不退此邪火伏郁皮膚之間久則毛髮焦枯肌表乾燥肉見消瘦是為骨蒸癆症宜蘆薈肥兒丸治之遲則不救如疹沒後身雖不見瘦削但時發壯熱煩躁不安搐掣驚悸神昏志亂者此陰血虛耗餘毒入肝而傳於心宜棗麥四物湯主之一疹沒綿綿發熱不知早治則成疳症必致腹脹午後發熱頭痛宜柴苓四物湯若口渴少食煩悶宜小柴胡湯一沒後潮熱宜升麻葛根湯煩渴用黃連解毒湯溺赤如米泔汁宜五苓散加車前子木通若見便血宜黃連解毒合犀角地黃湯鼻血用涼膈散加梔仁生地童便一沒後日夕煩躁譫語狂亂是餘熱在肺胃宜辰砂益元散燈草煎服下或辰砂五苓散水煎服一沒後飲食如常動止如故卒然心腹絞痛遍身汗出如水此元氣虛弱失於調補偶為惡氣所中謂之中惡危在旦夕用砂仁末二錢浮麥煎湯沖服或伏龍肝泡水溫飲亦百中救一一沒後腹痛兼瀉利宜連芍湯若腹脹不食脾胃受傷宜柴蘇清肺飲一面目浮腫此飲食內傷或過食生冷致陰陽不能升降膀胱之氣不行如見小便短少必致氣喘宜五苓散加木通滑石腹皮若見喘促又宜四苓加竹瀝桑皮葶藶喘促甚急者不治一沒後泄瀉用黃連解毒合導赤散若泄瀉不止口渴目閉四肢厥冷者難治加以嘔吐不食肛門突出或大孔直如竹筒者不治如沒後痢疾是熱積大腸宜四苓加芩連木通白芍或香連丸亦可一沒後咳嗽宜涼膈散加桔梗地骨皮嗽不止宜清肺飲或四物合二陳加桔梗栝蔞五味渴加麥冬喘加桑皮枳殼蘇子嗆嗽或咳出血此熱毒乘肺宜麥冬清肺飲一胸高如龜肩聳而喘血從口鼻出搖頭擺手面色時變枯黯者不治亦有肺氣虛為毒所遏而發喘不已者宜清肺飲倍人參不可拘肺熱一端純用清涼若聲啞喘咳身熱不退肺金受克宜清金降火湯又有麻毒內攻喘促胸突肚急目閉者九死一生之症速用防風消毒飲治之一沒後發癰毒肢節疼痛者乃熱毒留結宜羌活散微汗利之或遍身生瘡為麻風瘡宜大連翹飲若生瘡發熱不退宜解表用疏風散不治必每歲應時而發一沒後眼紅目腫翳膜遮睛乃麻毒上攻久必傷目宜芎歸飲一口舌生瘡腫痛此心脾有熱必二便結澀宜清心脾之火兼潤大腸用豬苓澤瀉湯泄去餘毒其症自愈若滿口唇舌黃赤白爛其症最重速宜清胃涼血佐以潤腸一沒後牙疳乃心脾二經為毒火所攻若不早治漸有穿腮落齒之患甚至痰喘救無及矣又麻後血液傷耗早食甜物及感風生蟲侵蝕筋骨口鼻壞爛先以米泔溫洗淨急用勝金散敷之或搽牙散亦好仍以消毒飲煎服合四物湯加甘草五味更妙若爛喉者以小竹筒裝藥吹之如山根發紅點者便不可治若牙疳肉爛鼻血橫行併為失血之症用四物加山楂茵陳木通犀角治之如疳及舌苔白色者則胃已爛亦不可治又有麻毒入胃結而不散致成牙齦黑爛出血是為走馬牙疳久則穿腮破爛缺唇崩鼻遂成危症外用文蛤散吹之或雄黃散先以艾煎湯洗淨搽之再服蘆薈黃連丸以清胃火大抵牙疳一症初見紅腫俱宜清胃散主之分論麻疹始終雜症發熱麻疹非熱不出然有微熱有壯熱有乍熱潮熱復熱之不同微熱者熱輕而不壯惟初起為宜正出之時熱不可微微則不能透表將沒及沒後見此為疹毒已盡不須服藥壯熱者經日不退正出時是為正候若初起壯熱直至已出不少減其症必重沒時壯熱不退尤為不宜急當用藥清解熱退神安方可無慮然亦有沒後壯熱口乾唇燥昏睡沉沉服清涼解毒之藥熱退身冷如冰少時又復大熱再投以芩連之類全無應效而且面色青慘喉作雞聲頭搖目泛氣喘神昏此為中氣虛寒浮陽外越有不得終日之勢非大辛大熱之品不足以衝開寒痰反真陽於內府速用熟附湯或加肉桂胡椒炮姜之類接用附子理中湯合六味丸料去澤瀉丹皮加枸杞子破故紙庶使寒消陽復風熄痰平再加棗仁白芍五味子以斂其陰所謂甘溫能除大熱正此意也有熱數日止過數日又熱或一日間早熱午涼中熱暮止均為乍熱未出時見之毒邪難透宜疏散正出時見之恐毒攻內宜疏托若沒後乍熱毒邪未盡當涼解分利又有一日一度如潮水之信來不失期曰潮熱初時必無此症出盡及沒後氣血兩虛營衛之行失其常度故熱應時而作宜益陰退陽乃為正治復熱者熱已退而復發亦沒後有之是餘毒未盡治宜涼解總之疹子出透其熱當減倘仍大熱者宜化毒清表湯疹已收沒而身熱者宜柴胡清熱飲身冷麻疹屬火身宜溫暖今反身冷如冰未出正出時見之最為逆候正沒及沒後有此屬氣血大虧脾胃將壞當行溫補或可得生咳嗽疹喜咳嗽咳多則毛竅開而易出故先時以嗽為吉若初熱三日中咳至四五日仍不見咳便非疹候初時咳少則腠理秘密而疹不出當於發散藥中加半夏以助其咳又有乾咳連咳不斷者此為火旺肺金受克必須清肺降火佐以升發初起升麻葛根湯加前胡桔梗蘇梗杏仁沒後用清金寧嗽湯但疹後旬日內尚宜有嗽所遺餘毒須假嗽而散此頓出頓入之勢切不可見嗽多而治嗽也氣喘喘為惡候麻疹厚為不宜喘者開口而作胸肋高疊起止不定是也當分虛實施治虛者小便清利大便溏瀉唇白身不甚熱絕無火證又非外邪必皆氣脫之候此非六氣煎貞元飲必不可也實者大便堅結小便赤澀熱重不退初出未透無汗用麻杏石甘湯已出用清氣化毒飲或如神定喘湯亦佳大抵未出而喘者可治已出並沒後喘者多不可救氣促氣來急迫呼吸緊而不和是屬肺病蓋肺為五臟華蓋主氣出入一經毒火熏灼失其清肅之權則氣不清因致急促見於未出正出之時治宜疏托甚至齁䶎聲鳴速為清痰降火十中可救二三若見於正沒沒後亦宜清火保金倘見風沒早毒火內攻並見齁䶎可不必治嘔吐麻疹嘔吐是胃中毒火不能發泄鬱而上攻須以竹茹石膏湯和中清熱其吐自止若吐清涎白沫亦胃火內逼津液上泛又有吐出如藥者有吐出成塊者皆宜降火消痰用花粉貝母甘桔芩連杏仁桑皮麥冬之類南星半夏等燥藥又不可妄用吐下蛔蟲蟲之吐下見於將出正出之間因胃中有熱膈上有痰蟲不能安所以吐而下也正沒沒後犯此是熱重不納食蟲無所養思食而出若過十餘條則有蟲厥之變初熱吐蟲者是脾胃虧虛疹必難出大非所宜沒後下蟲乃胃熱未清熱退自愈煩渴凡麻疹煩渴者乃毒火壅甚也心為熱擾神志不得安然故嘈雜而煩胃因熱鬱津液被火爍耗故口乾而渴初出用升麻葛根湯加麥冬花粉已出用白虎湯沒後用竹葉石膏湯若煩至乾燥渴無已時則亦難矣譫妄譫妄一症乃真氣昏昧神識不清所致夫心藏神而主火病則熱氣歸焉麻疹胃中熱甚上乘於心心為熱冒則神明昏亂而言無倫次遂成譫妄之語未出宜三黃石膏湯治之已出用黃連解毒湯治之發搐麻症發搐不可以急驚風同論初熱見形之時熱勢勃勃周身氣擾動筋絡遂抽搐無甚大害只宜疏散加以清涼若沒後壯熱不除忽作搐者宜導赤散加人參麥冬送七味安神丸小便清者可治短少者難治如見多痰或用抱龍丸或以四物湯加麥冬棗仁淡竹葉龍膽草甘草黃連茯苓辰砂石菖蒲之類飲食凡出疹不思飲食此胃為邪氣所侵或三四日或五六日亦無妨切不可因其不食著意治之只宜清胃火疹子出盡自能漸進穀食若麻後血虛脾弱不思食者宜四物湯加麥芽神麯治之如欲飲水者可少少與之則毒氣隨之漸解蓋疹為實熱自初至末必皆喜飲涼水此不必禁目疾凡疹初熱未出眼光如水此為正候若眼多眵淚乃肝脾有火無分前後總宜清熱未出時白珠赤肺有熱也疹出自解沒後白珠仍赤亦肺火未盡宜清肺瀉火若沒後不避風寒以致眼眶紅爛流淚速宜疏風解毒若延遲不治則有終身之患若沒後餘毒入目翳膜遮睛或成珠目蟹眼用孫氏洗肝散又斑瘡入目生翳障用通神散餘毒壞目用明目方鼻症鼻為肺竅肺氣清則疹易出若鼻乾無涕臟腑熱極塞而不通前後見之皆為重症或暫涕暫無或先無涕熱退清涕即來或因熱鼻眵乾結似無涕者此皆熱毒閉塞速為清熱解毒得嚏涕鼻通毒即解矣若毒火上衝肺氣載血上行則為鼻衄然衄中有發散之義以毒從衄解不須止但不可太過過則血脫而陰亡也如衄甚者外用發灰散吹入鼻中內服犀角地黃湯其血可止又有鼻扇者肺將絕也一見喘滿痰鳴便不能治若咽清不喘精神如故治以潤肺清痰庶危者猶可望其生也口舌牙喉病凡麻症口臭是火毒積於腸胃若其人平日已然又不以此論只清胃降火口臭自平若見唇口破裂知為心脾二經熱毒上衝初起色紅血活用清涼加以疏托尚可解散如見紫黑枯燥血已凝滯遂不易治沒後見此則心脾已敗必不免於危亡若唇生瘡亦屬胃熱每日用米泔水溫洗十餘次漸次消解至於舌乃心之苗舌苔薄熱亦輕舌苔厚熱亦重或生瘡蕈白屑腫痛皆心火炎灼懼宜清涼疏利治之惟黑苔枯燥起刺火亢而兼水化則胃敗矣凡出疹之先或有胃火及出疹之後餘毒不散熱毒積聚於牙齦若不知早為解毒多變走馬疳症又有熱重咬牙者此陽隱於陰必多渴而手足俱熱喜飲冷水宜滋陰降火如食辛辣助熱之物必致下血咽痛痰響而死蓋熱毒上攻咽喉輕則腫痛重則湯水難下最為可慮表邪郁遏疹毒不能發舒於外而咽喉腫痛者元參升麻湯主之裡熱壅盛疹已發於外而咽喉作痛者涼膈消毒飲主之若熱毒閉塞肺竅以致失音初出用元參升麻湯已出用加減涼膈散沒後宜兒茶散主之論汗凡出疹最喜有汗有汗則腠理開通毒從汗解但不可太過如汗太多用人參白虎湯或合黃連解毒湯治之若皮膚乾燥無汗閉而難出或致內攻為腹脹氣急等症此外為風寒所折夏秋用輕劑宣發肌表春冬用重劑升散寒邪如果屬火熱閉郁無汗必唇紅破裂二便結澀渾身脹痛多致喘促齁䶎痰鳴速用寒涼清肺降火俾肌表透達而有汗疹即隨汗而盡出於外後可無餘毒不然即成敗症故麻症始終以微汗為吉腹痛麻症腹痛由於食滯凝結熱毒不能宣發於外故有時曲腰啼叫兩眉頻蹙須用加味平胃散治之若不因食積全是熱毒內結治宜疏托使疹子盡出痛自止矣沒後見此又宜清涼解毒使毒內消痛亦隨減泄瀉麻本火候大便溏瀉黃褐色為正初熱正出時下利數次毒氣得泄但不宜多久久則脾氣下陷毒難發越後恐變痢初起作瀉者以升麻葛根湯加赤苓豬苓澤瀉主之已出作瀉者以黃連解毒湯主之若水瀉黃色有沫小便赤唇燥口乾乃毒熱移入腸胃傳化失常亦宜清涼利水俱不可用溫熱之劑如自利不止水瀉頻數最為惡候若疹子稠密或紫紅色則又無妨蓋以毒在大腸非瀉不解宜平胃散加黃連葛根連翹以解之疹子發透自然瀉止有沒後仍不止者此未出盡再用前藥倍連翹黃連加木通澤瀉牛蒡子分利之切勿治以固澀致腹脹痞滿喘急不治景岳以為瀉利一症果由疹毒固不可以溫補若其人脾氣本弱或過用寒涼之藥或誤食生冷致傷脾胃而為泄瀉者雖曰由疹而發而實非疹毒之病矣但察其無熱症熱脈而兼色白氣餒者便宜溫胃飲五君子煎胃關煎之類主之若執謂疹毒不可溫則無不危矣痢疾麻疹作痢謂之夾疹痢因毒熱未解移於大腸所致有腹痛欲解或赤或白或赤白相兼者悉用清熱導滯湯主之若見痢色紫黯或如癰膿屋漏水雞肝色黑豆汁氣喘燥渴發呃不食皆不可治若麻出之時曾作瀉痢未經清解至沒後變成休息痢裡急後重晝夜無度此餘毒留於大腸須分虛實用藥實者三黃丸利之虛者香連丸和之再以黃芩湯養血行氣血和則便膿自愈氣行則後重自除正此謂也大小便閉麻疹大便閉者乃火邪留結大腸結而不解致毒內攻故無論前後即與潤利無妨小水赤澀者初起正出時為正候若見於正沒及沒後為遺毒不散宜用導赤散治之如仍不通或因大便閉結所致通其大便小便自利沉睡凡麻疹熱輕神安氣安醒睡如常吉也設當發熱正出之時昏昏沉睡必是火邪內郁未透於表速宜勝藥宣發佐以清熱免致後患若正沒及沒後見此又是熱退神清多睡以養元復元氣不為害也倘昏睡不省人事不知痛癢或似睡非睡等症皆在不治又有一等面腫目閉者乃脾經火旺治以瀉黃利水火退目閉自開麻疳麻後發熱成疳初時夜間身熱自汗即退或日晡時面紅神倦嗜臥微熱得汗稍解日復如是宜早為施治用黃連解毒湯主之倘延遲失治或四五十日或百日或一二年形體日瘦腹膨泄瀉不可救藥妊娠出疹凡婦人懷胎出疹不可與尋常同論須以安胎清熱為主使胎無犯而麻易沒也宜四物湯加條芩白朮艾葉砂仁如胎氣上衝急用苧根艾葉煎湯磨檳榔少許服之即安蓋痘疹凡小兒出痘方愈隨即出疹名蓋痘疹因痘後餘毒未盡更兼不戒口腹外感風寒以致遍身出疹色赤作癢如如粟米漸成云片宜加味消毒飲疏風清熱疹即愈矣癮疹癮疹者發必多癢色則紅赤隱隱於皮膚之間乃心火灼於肺金又兼外感風濕先用加減羌活散疏風散濕繼以加味消毒飲清熱解毒表裡清而疹自愈禁忌凡麻疹初出切戒風寒生冷如一犯之則皮膚閉密毒氣壅滯遂變渾身青紫而毒反內攻煩躁腹痛氣喘悶亂諸症作矣欲出不出危亡立至首宜慎之至於飲食尤宜戒忌雞魚炙煿鹽醋五辛之類須過七七之後方宜食之惟宜食淡不可縱口致生他疾若誤食雞魚則終身粟起如雞皮之狀誤食豬肉則每歲出疹之月多致下利誤食鹽醋必致咳嗽亦遇出疹時必發誤食五辛則不時多生驚熱此皆出疹之家不可略意而遺小兒終身之患也戒之慎之麻疹備用諸方宣毒發表湯升麻葛根荊芥防風薄荷葉枳殼桔梗前胡連翹牛蒡子木通生甘草淡竹葉引加芫荽水煎外感寒邪加麻黃夏月勿用食滯加南山楂內熱加黃芩升麻葛根湯升麻葛根赤芍生甘草引加芫荽水煎防風解毒湯荊芥防風連翹枳殼牛蒡子桔梗石膏知母木通生甘草淡竹葉引